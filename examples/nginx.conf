# Quelora — reference nginx config for the bundled docker-compose.
#
# This is a STARTING POINT, not a turnkey config. To use it:
#   1. cp examples/nginx.conf config/nginx.conf
#   2. Search & replace YOUR_DOMAIN with your real domain.
#   3. Ensure ./data/certs/live/YOUR_DOMAIN/{fullchain,privkey}.pem exist
#      (use certbot or your own provisioning).
#   4. docker compose up -d
#
# Subdomains you'll likely want on the same cert (SAN):
#   YOUR_DOMAIN            — your website / landing
#   api.YOUR_DOMAIN        — public API
#   api-dashboard.YOUR_DOMAIN — admin API
#   dashboard.YOUR_DOMAIN  — admin SPA
#   cdn.YOUR_DOMAIN        — widget bundle (if you self-host the CDN)

events { worker_connections 1024; }

http {
    include            /etc/nginx/mime.types;
    default_type       application/octet-stream;
    sendfile           on;
    keepalive_timeout  65;
    server_tokens      off;

    gzip               on;
    gzip_types         text/plain text/css application/javascript application/json application/wasm image/svg+xml;
    gzip_min_length    1024;

    # ─── SSL globals ──────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── HTTP → HTTPS redirect + ACME challenge ───────────────────
    server {
        listen 80;
        server_name YOUR_DOMAIN api.YOUR_DOMAIN api-dashboard.YOUR_DOMAIN dashboard.YOUR_DOMAIN cdn.YOUR_DOMAIN;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── PUBLIC API (api.YOUR_DOMAIN) ─────────────────────────────
    server {
        listen 443 ssl;
        server_name api.YOUR_DOMAIN;

        # SSE endpoint — disable buffering, long timeout
        location /notifications/stream {
            proxy_pass http://app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 86400s;
        }

        # WebSocket — upgrade headers
        location /ws/live {
            proxy_pass http://app:3000/ws/live;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        # User-uploaded assets (avatars, backgrounds)
        location /assets/ {
            alias /srv/assets/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass http://app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── DASHBOARD API (api-dashboard.YOUR_DOMAIN) ────────────────
    server {
        listen 443 ssl;
        server_name api-dashboard.YOUR_DOMAIN;

        client_max_body_size 25M;

        # Sentinel debug WebSocket
        location /ws/debug-broker {
            proxy_pass http://app-dashboard:3010;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        location / {
            proxy_pass http://app-dashboard:3010;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── DASHBOARD SPA (dashboard.YOUR_DOMAIN) ────────────────────
    server {
        listen 443 ssl;
        server_name dashboard.YOUR_DOMAIN;

        location / {
            proxy_pass http://dashboard:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── (Optional) YOUR LANDING / SITE (YOUR_DOMAIN) ─────────────
    # If you also serve your own website from the same nginx, add it here.
    # Otherwise point your DNS away from this server for YOUR_DOMAIN.
    #
    # server {
    #     listen 443 ssl;
    #     server_name YOUR_DOMAIN www.YOUR_DOMAIN;
    #     root /srv/site;
    #     index index.html;
    #     location / { try_files $uri $uri/ /index.html; }
    # }
}
